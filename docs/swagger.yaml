host: localhost:5001
info:
  contact:
    email: contact@kubex.world
    name: GNyx API Support
    url: https://gnyx.kubex.world
  description: Backend modular API for GNyx. (Powered by Kubex Ecosystem)
  termsOfService: https://gnyx.kubex.world/terms
  title: GNyx API
  version: 1.0.0
paths:
  /api/v1/access/members:
    get:
      description: Returns members, effective permissions, and role catalog for the
        active tenant scope.
      parameters:
      - description: Tenant ID
        in: query
        name: tenant_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes.accessMembersResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
      security:
      - BearerAuth: []
      summary: List tenant access members
      tags:
      - Access
  /api/v1/access/members/{user_id}/role:
    patch:
      consumes:
      - application/json
      description: Reassigns the role of a member inside the active tenant scope.
      parameters:
      - description: Member user ID
        in: path
        name: user_id
        required: true
        type: string
      - description: Role mutation payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/routes.accessMemberRoleUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes.accessMemberMutationResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a tenant member role
      tags:
      - Access
  /api/v1/access/pending:
    get:
      description: Returns the pending access queue for the active tenant scope.
      parameters:
      - description: Tenant ID
        in: query
        name: tenant_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes.accessPendingListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
      security:
      - BearerAuth: []
      summary: List pending access requests
      tags:
      - Access
  /api/v1/access/pending/{request_id}:
    patch:
      consumes:
      - application/json
      description: Approves or rejects a pending access request for the target tenant.
      parameters:
      - description: Pending request ID
        in: path
        name: request_id
        required: true
        type: string
      - description: Review payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/routes.pendingAccessReviewRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes.accessPendingReviewResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
      security:
      - BearerAuth: []
      summary: Review a pending access request
      tags:
      - Access
  /api/v1/auth/google/start:
    get:
      description: Redirects the browser to the Google consent screen.
      produces:
      - text/plain
      responses:
        "302":
          description: Redirect to Google OAuth
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
      summary: Start Google OAuth
      tags:
      - Auth
  /api/v1/auth/me:
    get:
      description: Returns the authenticated user profile plus memberships, team memberships,
        and access scope.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - Auth
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchanges a valid refresh token for a new access and refresh token
        pair.
      parameters:
      - description: Refresh payload
        in: body
        name: payload
        schema:
          $ref: '#/definitions/routes.refreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes.authTokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
      summary: Refresh tokens
      tags:
      - Auth
  /api/v1/auth/sign-in:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns access and refresh tokens.
      parameters:
      - description: Sign in payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/routes.signInRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes.authTokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
      summary: Sign in
      tags:
      - Auth
  /api/v1/auth/sign-up:
    post:
      consumes:
      - application/json
      description: Creates a local user with email and password.
      parameters:
      - description: Sign up payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/routes.signUpRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/routes.signUpResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
      summary: Sign up a local user
      tags:
      - Auth
  /api/v1/auth/v1/callback:
    get:
      description: Exchanges the Google authorization code, issues local tokens, and
        redirects back to the frontend.
      parameters:
      - description: OAuth authorization code
        in: query
        name: code
        required: true
        type: string
      - description: Frontend redirect path
        in: query
        name: state
        type: string
      produces:
      - text/plain
      responses:
        "302":
          description: Redirect back to frontend
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
      summary: Handle Google OAuth callback
      tags:
      - Auth
  /api/v1/bi/boards/export:
    post:
      consumes:
      - application/json
      description: Exports the generated board payloads as a ZIP archive for portability
        and demo usage.
      parameters:
      - description: Board export request
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/routes.boardExportRequest'
      produces:
      - application/zip
      responses:
        "200":
          description: ZIP archive
          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
      summary: Export a generated BI board bundle
      tags:
      - Runtime BI
  /api/v1/bi/boards/generate:
    post:
      consumes:
      - application/json
      description: Generates a grounded BI board plan and dashboard schema for the
        supported domain slice.
      parameters:
      - description: Board generation request
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/routes.boardGenerateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes.boardGenerateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/routes.unifiedErrorResponse'
      summary: Generate a BI board
      tags:
      - Runtime BI
  /api/v1/bi/catalog/status:
    get:
      description: Returns the status of the grounded Sankhya metadata catalog used
        by BI generation.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/bi.CatalogStatus'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
      summary: Get BI catalog status
      tags:
      - Runtime BI
  /api/v1/config:
    get:
      description: Returns the public runtime configuration used by the frontend.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes.runtimeConfigResponse'
      summary: Get runtime configuration snapshot
      tags:
      - Runtime AI
  /api/v1/health:
    get:
      description: Returns runtime health plus provider dependency status.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Detailed health check
      tags:
      - Runtime AI
  /api/v1/healthz:
    get:
      description: Returns a compact liveness payload for deployment health checks.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes.healthzResponse'
      summary: Lightweight health check
      tags:
      - Runtime AI
  /api/v1/invites:
    post:
      consumes:
      - application/json
      description: Creates a new invite and sends an invitation email.
      parameters:
      - description: Invite Request
        in: body
        name: invite
        required: true
        schema:
          $ref: '#/definitions/invite.CreateInviteReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/invite.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/invite.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/invite.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/invite.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/invite.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create an invite
      tags:
      - Invites
  /api/v1/invites/{token}:
    get:
      consumes:
      - application/json
      description: Validates the invite token and retrieves associated invite details.
      parameters:
      - description: Invite Token
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/invite.InviteDetailsDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/invite.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/invite.ErrorResponse'
      summary: Validate an invite token
      tags:
      - Invites
  /api/v1/invites/{token}/accept:
    post:
      consumes:
      - application/json
      description: Accepts the invite associated with the token and creates a user
        account.
      parameters:
      - description: Invite Token
        in: path
        name: token
        required: true
        type: string
      - description: Accept Invite Request
        in: body
        name: acceptInvite
        required: true
        schema:
          $ref: '#/definitions/invite.AcceptInviteReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/invite.UserDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/invite.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/invite.ErrorResponse'
      summary: Accept an invite
      tags:
      - Invites
  /api/v1/me:
    get:
      description: Returns the authenticated user profile plus memberships, team memberships,
        and access scope.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - Auth
  /api/v1/providers:
    get:
      description: Returns the active provider catalog and health status for the gateway
        runtime.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes.providersListResponse'
      summary: List runtime providers
      tags:
      - Runtime AI
  /api/v1/public/access-request:
    post:
      consumes:
      - application/json
      description: Receives a public onboarding or prospect request and stores it
        in the pending access queue for manual review.
      parameters:
      - description: Access request payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/routes.publicAccessRequestPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes.publicAccessRequestResponse'
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/routes.publicAccessRequestResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
      summary: Register a public access request
      tags:
      - Public Access
  /api/v1/sign-out:
    post:
      consumes:
      - application/json
      description: Revokes the current refresh token and clears auth cookies.
      parameters:
      - description: Sign out payload
        in: body
        name: payload
        schema:
          $ref: '#/definitions/routes.refreshRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
      summary: Sign out
      tags:
      - Auth
  /api/v1/test:
    get:
      description: Performs a lightweight availability check against a configured
        provider.
      parameters:
      - description: Provider name
        in: query
        name: provider
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes.providerTestResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/routes.authErrorResponse'
      summary: Test a provider
      tags:
      - Runtime AI
  /api/v1/unified:
    post:
      consumes:
      - application/json
      description: Executes a non-streaming provider request using the active server-side
        provider registry.
      parameters:
      - description: Unified AI request
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/routes.unifiedRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes.unifiedResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/routes.unifiedErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/routes.unifiedErrorResponse'
      summary: Execute a unified AI request
      tags:
      - Runtime AI
  /api/v1/unified/stream:
    post:
      consumes:
      - application/json
      description: Executes a streaming provider request using Server-Sent Events.
      parameters:
      - description: Unified streaming AI request
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/routes.unifiedRequest'
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/routes.unifiedErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.unifiedErrorResponse'
      summary: Execute a streaming unified AI request
      tags:
      - Runtime AI
securityDefinitions:
  BearerAuth:
    description: Provide "Bearer <token>"
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
