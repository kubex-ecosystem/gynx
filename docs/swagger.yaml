      description: Initiates OAuth2 PKCE flow and generates authorization code
      parameters:
      - description: OAuth Client ID
        in: query
        name: client_id
        required: true
        type: string
      - description: Redirect URI
        in: query
        name: redirect_uri
        required: true
        type: string
      - description: PKCE Code Challenge
        in: query
        name: code_challenge
        required: true
        type: string
      - default: S256
        description: PKCE Method (S256 or plain)
        in: query
        name: code_challenge_method
        type: string
      - description: Requested scope
        in: query
        name: scope
        type: string
      - description: State parameter
        in: query
        name: state
        type: string
      produces:
      - application/json
      responses:
        "302":
          description: Redirect with authorization code
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin.H'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gin.H'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin.H'
      summary: OAuth2 Authorization Endpoint
      tags:
      - oauth
