[app]
name = "gnyx"

[build]
type = "docker"
dockerfile = "Dockerfile.koyeb"

[deploy]
type = "web"

[[deploy.ports]]
port = 5000
protocol = "http"

[[deploy.env]]
name = "CONFIG_FILE"
value = "./config/koyeb.yml"

[[deploy.env]]
name = "PORT"
value = "5000"

# Health check configuration
[deploy.health_check]
grace_period = "30s"
interval = "10s"
restart_limit = 3
timeout = "5s"

[deploy.health_check.http]
port = 5000
path = "/api/v1/health"

# Instance configuration
[deploy.instance]
type = "nano"

# Regions (choose one)
[deploy.regions]
list = ["was"]

# Auto-scaling
[deploy.autoscaling]
min = 1
max = 3
target_cpu_percent = 80

